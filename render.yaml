# Render deployment configuration for the Python FastAPI backend
# See: https://render.com/docs/yaml-spec

services:
  - type: web
    name: qia-scheduler-api
    runtime: python
    region: singapore  # Closest to Philippines
    plan: free  # Use 'starter' for production
    rootDir: my-app/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 5 --limit-concurrency 25
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false  # Manual input required
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Manual input required
      - key: FRONTEND_URL
        value: https://qia-room-allocation.vercel.app
      # Free-tier stability knobs
      - key: SCHEDULER_RESOURCE_PROFILE
        value: render-free
      - key: SCHEDULER_CPU_YIELD_EVERY_ITERATIONS
        value: "25"
      - key: SCHEDULER_CPU_YIELD_MS
        value: "3.0"
      - key: SCHEDULER_MAX_ITERATIONS_CAP
        value: "2500"
      - key: SCHEDULER_MAX_ITERATIONS_CAP_LARGE
        value: "1600"
      - key: SCHEDULER_ADAPTIVE_RETRY_PASSES
        value: "1"
      - key: SCHEDULE_QUEUE_MAX_WAIT_SECONDS
        value: "120"
      - key: SCHEDULE_QUEUE_MAX_LENGTH
        value: "3"
    healthCheckPath: /health
    autoDeploy: true
